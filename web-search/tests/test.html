<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>web-search skill — desktop harness</title>
  <style>
    body { font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 820px; margin: 24px auto; padding: 0 16px; color: #111; }
    h1 { font-size: 18px; margin-bottom: 4px; }
    p.hint { color: #555; margin-top: 0; }
    label { display: block; font-weight: 600; margin: 12px 0 4px; }
    input, textarea { width: 100%; font: inherit; padding: 8px; border: 1px solid #ccc; border-radius: 6px; }
    textarea { min-height: 80px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    button { margin-top: 12px; padding: 8px 14px; font: inherit; font-weight: 600; background: #2563eb; color: white; border: 0; border-radius: 6px; cursor: pointer; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    pre { background: #f6f7f9; border: 1px solid #e2e4e8; border-radius: 6px; padding: 12px; white-space: pre-wrap; word-break: break-word; max-height: 540px; overflow: auto; }
    .timings { color: #555; font-size: 12px; margin: 8px 0 0; }
    .row { display: flex; gap: 12px; align-items: baseline; flex-wrap: wrap; }
    .row > * { flex: 1; min-width: 200px; }
  </style>
</head>
<body>
  <h1>web-search skill — desktop smoke test</h1>
  <p class="hint">Loads the real skill modules and calls <code>ai_edge_gallery_get_result</code> the same way Google AI Edge Gallery does. Run from a local static server (CORS requires it).</p>

  <div class="row">
    <div>
      <label for="q">Query</label>
      <input id="q" placeholder="e.g., Gemma 4 release announcement 2026" value="Gemma 4 release announcement 2026">
    </div>
    <div>
      <label for="secret">Secret (optional)</label>
      <input id="secret" placeholder="leave blank for Jina default">
    </div>
  </div>

  <button id="go">Run skill</button>

  <p class="timings" id="timings"></p>

  <label for="out">Skill output (what Gemma receives)</label>
  <pre id="out">—</pre>

  <script type="module">
    import { search } from "../assets/search.js";
    import { extract } from "../assets/extract.js";
    import { distill } from "../assets/distill.js";
    import { formatContext } from "../assets/format.js";

    const outEl = document.getElementById("out");
    const timingsEl = document.getElementById("timings");
    const btn = document.getElementById("go");

    btn.addEventListener("click", async () => {
      const query = document.getElementById("q").value.trim();
      const secret = document.getElementById("secret").value.trim();
      if (!query) return;

      btn.disabled = true;
      outEl.textContent = "Running…";
      timingsEl.textContent = "";

      const tStart = performance.now();
      try {
        const t0 = performance.now();
        const hits = await search(query, { secret, topN: 3, timeoutMs: 8000 });
        const tSearch = performance.now() - t0;

        const t1 = performance.now();
        const pages = await Promise.all(
          hits.map(h => extract(h.url, { timeoutMs: 10000 }).catch(e => ({ text: "", failed: true, reason: String(e?.message || e) })))
        );
        const tFetch = performance.now() - t1;

        const t2 = performance.now();
        const distilled = pages.map((p, i) => ({
          rank: hits[i].rank, url: hits[i].url, title: hits[i].title,
          text: p.failed ? "" : distill(p.text, query, { maxTokens: 500 }),
        }));
        const ctx = formatContext(query, distilled, { totalBudget: 2000 });
        const tDistill = performance.now() - t2;

        const tTotal = performance.now() - tStart;
        timingsEl.textContent =
          `search ${Math.round(tSearch)}ms · fetch×3 ${Math.round(tFetch)}ms · distill ${Math.round(tDistill)}ms · total ${Math.round(tTotal)}ms · ~${Math.ceil(ctx.length / 4)} tokens`;
        outEl.textContent = ctx;
      } catch (e) {
        outEl.textContent = "ERROR: " + (e?.message || e);
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>

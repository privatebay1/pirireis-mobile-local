<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>web-search skill — desktop harness</title>
  <style>
    body { font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 820px; margin: 24px auto; padding: 0 16px; color: #111; }
    h1 { font-size: 18px; margin-bottom: 4px; }
    p.hint { color: #555; margin-top: 0; }
    label { display: block; font-weight: 600; margin: 12px 0 4px; }
    input { width: 100%; font: inherit; padding: 8px; border: 1px solid #ccc; border-radius: 6px; }
    button { margin-top: 12px; padding: 8px 14px; font: inherit; font-weight: 600; background: #2563eb; color: white; border: 0; border-radius: 6px; cursor: pointer; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    pre { background: #f6f7f9; border: 1px solid #e2e4e8; border-radius: 6px; padding: 12px; white-space: pre-wrap; word-break: break-word; max-height: 540px; overflow: auto; }
    iframe { display: block; width: 100%; height: 120px; border: 1px solid #eee; border-radius: 6px; margin-top: 12px; }
    .row { display: flex; gap: 12px; align-items: baseline; flex-wrap: wrap; }
    .row > * { flex: 1; min-width: 200px; }
  </style>
</head>
<body>
  <h1>web-search skill — desktop smoke test</h1>
  <p class="hint">Loads <code>scripts/index.html</code> in an iframe (same bundle Gallery runs) and calls <code>iframe.contentWindow.ai_edge_gallery_get_result</code>. Serve via a static server (CORS requires it).</p>

  <div class="row">
    <div>
      <label for="q">Query</label>
      <input id="q" placeholder="e.g., World Cup 2026 start date" value="World Cup 2026 start date">
    </div>
    <div>
      <label for="secret">Secret (optional)</label>
      <input id="secret" placeholder="leave blank for DDG default">
    </div>
  </div>

  <button id="go">Run skill</button>

  <label for="out">Skill response (JSON Gemma receives)</label>
  <pre id="out">—</pre>

  <iframe id="sandbox" src="../scripts/index.html" title="skill sandbox"></iframe>

  <script>
    const iframe = document.getElementById("sandbox");
    const btn = document.getElementById("go");
    const outEl = document.getElementById("out");

    btn.addEventListener("click", async () => {
      const query = document.getElementById("q").value.trim();
      const secret = document.getElementById("secret").value.trim();
      if (!query) return;
      btn.disabled = true;
      outEl.textContent = "Running…";
      try {
        const fn = iframe.contentWindow && iframe.contentWindow["ai_edge_gallery_get_result"];
        if (typeof fn !== "function") {
          outEl.textContent = "ERROR: skill did not expose ai_edge_gallery_get_result — reload the iframe.";
          return;
        }
        const tStart = performance.now();
        const raw = await fn(JSON.stringify({ query }), secret);
        const t = Math.round(performance.now() - tStart);
        const parsed = JSON.parse(raw);
        outEl.textContent = "time: " + t + "ms\n\n" + (parsed.result || ("ERROR: " + parsed.error));
      } catch (e) {
        outEl.textContent = "Crash: " + ((e && e.message) || e);
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
